<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Window Layout Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 14px;
      user-select: none;
      overflow: hidden;
    }

    h2 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6c7086;
      margin-bottom: 8px;
    }

    section { margin-bottom: 14px; }

    .row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
    }

    select, input[type="text"] {
      flex: 1;
      min-width: 0;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      padding: 6px 8px;
      font-size: 12px;
      outline: none;
    }

    select:focus, input[type="text"]:focus { border-color: #89b4fa; }

    button {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    button:hover { background: #45475a; }

    button.primary {
      background: #89b4fa;
      border-color: #89b4fa;
      color: #1e1e2e;
      font-weight: 600;
    }
    button.primary:hover { background: #74c7ec; border-color: #74c7ec; }

    button.danger {
      background: #f38ba8;
      border-color: #f38ba8;
      color: #1e1e2e;
      font-weight: 600;
    }
    button.danger:hover { background: #eba0ac; border-color: #eba0ac; }

    .status {
      font-size: 11px;
      color: #6c7086;
      min-height: 16px;
      margin-top: 2px;
    }
    .status.ok   { color: #a6e3a1; }
    .status.err  { color: #f38ba8; }
    .status.warn { color: #fab387; }

    .divider {
      border: none;
      border-top: 1px solid #313244;
      margin: 12px 0;
    }

    /* Layout list */
    #layout-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    #layout-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      background: #313244;
      border-radius: 6px;
      border: 1px solid #45475a;
      font-size: 12px;
    }

    #layout-list li span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #layout-list li button { padding: 3px 8px; font-size: 11px; }

    /* Lock slots */
    .slot-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 8px;
      margin-bottom: 6px;
    }

    .slot-row.active {
      border-color: #a6e3a1;
      background: #1a2e25;
    }

    .slot-row select {
      flex: 1;
      min-width: 0;
      padding: 4px 6px;
      font-size: 11px;
    }

    .slot-row button {
      padding: 4px 10px;
      font-size: 11px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #45475a;
      flex-shrink: 0;
    }
    .dot.active { background: #a6e3a1; }

    .slot-label {
      font-size: 12px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer-row {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .footer-row button { flex: 1; }
  </style>
</head>
<body>

  <!-- Lock Browser -->
  <section>
    <h2>Lock Browser Windows</h2>
    <div id="lock-slots"></div>
    <div class="footer-row">
      <button id="btn-refresh">↻ Refresh</button>
      <button id="btn-unlock-all" class="danger">Unlock All</button>
    </div>
    <div class="status" id="lock-status"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
